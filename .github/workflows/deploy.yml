name: Deploy with Secrets

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Replace secrets
      run: |
        echo "=== Replacing secrets ==="
        ls -la api/
        echo ""
        
        sed -i "s|{{PAYMENT_SERVER_URL}}|${{ secrets.PAYMENT_SERVER_URL }}|g" api/create-payment.php 2>/dev/null || echo "create-payment.php not found"
        sed -i "s|{{SECRET_TOKEN}}|${{ secrets.SECRET_TOKEN }}|g" api/create-payment.php 2>/dev/null || true
        
        sed -i "s|{{LICENSE_SERVER_URL}}|${{ secrets.LICENSE_SERVER_URL }}|g" api/verify.php 2>/dev/null || echo "verify.php not found"
        sed -i "s|{{SECRET_TOKEN}}|${{ secrets.SECRET_TOKEN }}|g" api/verify.php 2>/dev/null || true
        
        sed -i "s|{{MESSAGE_SERVER_URL}}|${{ secrets.MESSAGE_SERVER_URL }}|g" api/send-message.php 2>/dev/null || echo "send-message.php not found"
        sed -i "s|{{SECRET_TOKEN}}|${{ secrets.SECRET_TOKEN }}|g" api/send-message.php 2>/dev/null || true
        
        echo "=== Done ==="
        
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
